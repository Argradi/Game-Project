<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div id="board3">
        <h1 id="titulo">Average Adventure</h1>
        <button id="play-button" class="button">Jugar</button>
        <button id="controls-button" class="button">Controles</button>
        <div id="controls">
            <div id="arr-left" class="arrow">←</div>
            <div id="arr-up" class="arrow">↑</div>
            <div id="arr-right" class="arrow">→</div>
            <div id="arr-down" class="arrow">↓</div>
            <div id="space">Space</div>
            <div id="arrow1">→</div>
            <div id="arrow2">→</div>
            <div id="mov">Movement</div>
            <div id="shot">Shot</div>
            <button id="close">Close</button>
        </div>
    </div>
    <script src="./js/index.js"></script>
</body>
</html>
